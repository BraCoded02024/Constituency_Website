# Constituency site — no domain yet: open http://YOUR_VPS_IP:8081
#
# On the VPS (after git pull so frontend uses same-origin /api in production):
#   cd ~/Constituency_Website/frontend && npm run build && pm2 restart constituency-web
#
# Install Nginx snippet:
#   sudo cp ~/Constituency_Website/deploy/nginx-constituency-by-ip.conf /etc/nginx/sites-available/constituency
#   sudo ln -sf /etc/nginx/sites-available/constituency /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 8081/tcp
#
# PM2: API on 127.0.0.1:5001, Next on 127.0.0.1:3001 (nukoo keeps 80/443).

server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    client_max_body_size 25M;

    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
